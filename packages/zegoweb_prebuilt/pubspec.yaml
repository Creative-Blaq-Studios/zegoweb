name: zegoweb_prebuilt
description: >
  Unofficial Flutter web plugin wrapping ZEGOCLOUD's @zegocloud/zego-uikit-prebuilt
  JavaScript UIKit via dart:js_interop. Drop-in pre-built call UI.
  Not affiliated with or endorsed by ZEGOCLOUD.
version: 0.0.1
homepage: https://github.com/edwincoderyu/zegoweb
repository: https://github.com/edwincoderyu/zegoweb
issue_tracker: https://github.com/edwincoderyu/zegoweb/issues

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  web: ^1.0.0
  meta: ^1.10.0
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      web:
        fileName: zegoweb_prebuilt.dart
