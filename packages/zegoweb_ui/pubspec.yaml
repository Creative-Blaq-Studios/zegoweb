name: zegoweb_ui
description: >
  Flutter-native call UI built on zegoweb core. Drop-in ZegoCallScreen widget
  with composable layouts, controls, and ThemeExtension theming.
  Not affiliated with or endorsed by ZEGOCLOUD.
version: 0.0.1
license: MIT
homepage: https://github.com/Creative-Blaq-Studios/zegoweb
repository: https://github.com/Creative-Blaq-Studios/zegoweb
issue_tracker: https://github.com/Creative-Blaq-Studios/zegoweb/issues

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.10.0
  zegoweb: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
