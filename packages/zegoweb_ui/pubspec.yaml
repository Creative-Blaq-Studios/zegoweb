name: zegoweb_ui
description: >
  Flutter-native call UI built on zegoweb core. Drop-in ZegoCallScreen widget
  with composable layouts, controls, and ThemeExtension theming.
  Not affiliated with or endorsed by ZEGOCLOUD.
version: 0.0.1
homepage: https://github.com/edwincoderyu/zegoweb
repository: https://github.com/edwincoderyu/zegoweb
issue_tracker: https://github.com/edwincoderyu/zegoweb/issues

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.10.0
  zegoweb:
    path: ../zegoweb

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
