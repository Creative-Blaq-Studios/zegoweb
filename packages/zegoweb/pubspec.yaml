name: zegoweb
description: >
  Unofficial Flutter web plugin wrapping ZEGOCLOUD's Express Video Web SDK
  (zego-express-engine-webrtc) via dart:js_interop. Not affiliated with or
  endorsed by ZEGOCLOUD.
version: 0.0.1
homepage: https://github.com/Creative-Blaq-Studios/zegoweb
repository: https://github.com/Creative-Blaq-Studios/zegoweb
issue_tracker: https://github.com/Creative-Blaq-Studios/zegoweb/issues

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  meta: ^1.10.0
  # pointycastle is a pure-Dart crypto package used by the local-development
  # token generator at lib/src/internal/token_generator.dart. It compiles on
  # both VM and web. Production callers will replace the local generator with
  # a server-minted token via tokenProvider, so this dep is small and stable.
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  args: ^2.5.0
  test: ^1.24.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: ZegowebPluginRegistrant
        fileName: zegoweb.dart
