name: zegoweb
description: >
  Unofficial Flutter web plugin wrapping ZEGOCLOUD's Express Video Web SDK
  (zego-express-engine-webrtc) via dart:js_interop. Not affiliated with or
  endorsed by ZEGOCLOUD.
version: 0.0.1
homepage: https://github.com/edwincoderyu/zegoweb
repository: https://github.com/edwincoderyu/zegoweb
issue_tracker: https://github.com/edwincoderyu/zegoweb/issues

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  meta: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: ZegowebPluginRegistrant
        fileName: zegoweb.dart
