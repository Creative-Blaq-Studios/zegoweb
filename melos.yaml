name: zegoweb
repository: https://github.com/Creative-Blaq-Studios/zegoweb

packages:
  - packages/*
  - packages/*/example

command:
  bootstrap:
    environment:
      sdk: ">=3.4.0 <4.0.0"
      flutter: ">=3.22.0"

scripts:
  analyze:
    run: melos exec -- "flutter analyze"
    description: Run flutter analyze in every package.

  test:
    run: melos exec --dir-exists=test -- "flutter test"
    description: Run flutter test (VM) in every package that has a test directory.

  test-chrome:
    run: melos exec --dir-exists=test -- "flutter test --platform chrome"
    description: Run flutter test --platform chrome in every package that has a test directory.

  format:
    run: melos exec -- "dart format ."
    description: Run dart format across every package.

  format-check:
    run: melos exec -- "dart format --output=none --set-exit-if-changed ."
    description: Fail (without writing changes) if any package is not formatted.

  docs:api:
    description: Generate dartdoc for all packages into docs-site/static/api/
    run: |
      mkdir -p docs-site/static/api
      dart doc packages/zegoweb -o docs-site/static/api/zegoweb
      dart doc packages/zegoweb_ui -o docs-site/static/api/zegoweb_ui
      dart doc packages/zegoweb_prebuilt -o docs-site/static/api/zegoweb_prebuilt

  docs:serve:
    description: Start Docusaurus dev server
    run: cd docs-site && npm start

  docs:build:
    description: Build full docs site (dartdoc + Docusaurus)
    run: |
      melos run docs:api
      cd docs-site && npm run build
